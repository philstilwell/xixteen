<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>XiXteen</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="src/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand-lockup">
        <p class="eyebrow">Daily critical thinking</p>
        <h1>XiXteen</h1>
      </div>
      <div class="topbar-actions">
        <button id="start-daily" class="primary-action" type="button">Today's Quiz</button>
        <button id="start-practice" class="secondary-action" type="button">Practice</button>
      </div>
    </header>

    <main>
      <section class="gallery-shell" aria-labelledby="gallery-title">
        <div class="gallery-copy">
          <p class="eyebrow">The sixteen skills</p>
          <h2 id="gallery-title">A daily grid for sharper judgment.</h2>
          <p>One objective item per skill, every day.</p>
        </div>
        <div id="skill-gallery" class="skill-gallery" aria-label="Critical thinking skills"></div>
      </section>

      <section id="workbench" class="workbench" aria-label="Quiz workbench">
        <section class="quiz-shell" aria-labelledby="quiz-title">
          <div class="section-head">
            <div>
              <p class="eyebrow" id="quiz-date"></p>
              <h2 id="quiz-title">Today's XiXteen</h2>
            </div>
            <div class="mode-switch" role="tablist" aria-label="Quiz mode">
              <button class="mode-button is-active" data-mode="daily" type="button">Daily</button>
              <button class="mode-button" data-mode="practice" type="button">Practice</button>
            </div>
          </div>

          <div class="progress-wrap" aria-hidden="true">
            <div id="quiz-progress" class="progress-bar"></div>
          </div>

          <div id="quiz-panel" class="quiz-panel"></div>
        </section>

        <aside class="profile-panel" aria-labelledby="profile-title">
          <div class="section-head compact">
            <div>
              <p class="eyebrow">Profile</p>
              <h2 id="profile-title">Thinking Map</h2>
            </div>
            <button id="reset-stats" class="icon-button" type="button" title="Reset local stats" aria-label="Reset local stats">Reset</button>
          </div>
          <div id="profile-summary" class="summary-grid"></div>
          <div id="skill-list" class="skill-list"></div>
        </aside>

        <section class="leaderboard-panel" aria-labelledby="leaderboard-title">
          <div class="section-head compact">
            <div>
              <p class="eyebrow">Leaderboard</p>
              <h2 id="leaderboard-title">Daily Board</h2>
            </div>
          </div>
          <ol id="leaderboard-list" class="leaderboard-list"></ol>
        </section>
      </section>
    </main>

    <script type="module" src="src/main.js"></script>
  </body>
</html>
